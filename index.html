<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meshu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: #fff;
            color: #111;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        main { text-align: center; max-width: 340px; }

        .face { font-size: 3.5rem; line-height: 1; margin-bottom: 1rem; }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: -.04em;
            margin-bottom: 2rem;
        }

        p {
            font-size: .78rem;
            color: #777;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .cta a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .78rem;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #111;
            padding-bottom: 1px;
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .cta a:hover .arrow { transform: translateX(3px); }
        .arrow { display: inline-block; transition: transform .15s ease; }

        footer { margin-top: 5rem; font-size: .6rem; color: #ddd; }
    </style>
</head>
<body>
    <main>
        <div class="face">(•⩊•)</div>
        <h1>meshu</h1>
        <p>Your 3D models leave traces you can't see.<br>We make sure those traces are yours.</p>
        <div class="cta">
            <a href="mailto:danielmotilla@proton.me?subject=MesHu beta">
                <span>Request beta access</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </main>
    <footer>early research · made with care</footer>
</body>
</html>
